  qualityResults: [QualityResult!]!
  createdAt: DateTime!
  updatedAt: DateTime!
}

type WorkOrderOperation {
  id: UUID!
  workOrderId: UUID!
  operationNumber: Int!
  name: String!
  description: String
  workCenterId: UUID
  workCenter: WorkCenter
  plannedDuration: Float
  actualDuration: Float
  status: WorkOrderStatus!
  startDate: DateTime
  endDate: DateTime
}

type ProductionRecord {
  id: UUID!
  workOrderId: UUID!
  workCenterId: UUID
  timestamp: DateTime!
  quantity: Float!
  scrapQuantity: Float
  unit: String!
  operatorId: String
  shiftId: UUID
  notes: String
}

type Shift {
  id: UUID!
  plantId: UUID!
  shiftType: ShiftType!
  name: String!
  startTime: String!
  endTime: String!
  isActive: Boolean!
  supervisorId: String
}

# ─────────────────────────────────────────────
# Product & Bill of Materials
# ─────────────────────────────────────────────

type Product {
  id: UUID!
  partNumber: String!
  name: String!
  description: String
  revision: String
  unit: String!
  category: String
  billOfMaterials: BillOfMaterials
  routings: [Routing!]!
  specifications: [ProductSpecification!]!
}

type BillOfMaterials {
  id: UUID!
  productId: UUID!
  revision: String!
  effectiveDate: DateTime!
  components: [BOMComponent!]!
}

type BOMComponent {
  id: UUID!
  bomId: UUID!
  componentProductId: UUID!
  component: Product!
  quantity: Float!
  unit: String!
  position: Int
  referenceDesignator: String
}

type Routing {
  id: UUID!
  productId: UUID!
  name: String!
  revision: String!
  effectiveDate: DateTime!
  operations: [RoutingOperation!]!
}

type RoutingOperation {
  id: UUID!
  routingId: UUID!
  operationNumber: Int!
  name: String!
  workCenterCode: String
  setupTime: Float
  runTime: Float
  teardownTime: Float
  instructions: String
}

type ProductSpecification {
  id: UUID!
  productId: UUID!
  name: String!
  description: String
  nominalValue: Float
  lowerLimit: Float
  upperLimit: Float
  unit: String
  isCritical: Boolean!
}

# ─────────────────────────────────────────────
# Quality Management
# ─────────────────────────────────────────────

type QualityResult {
  id: UUID!
  workOrderId: UUID
  batchId: UUID
  productId: UUID!
  product: Product!
  inspectionDate: DateTime!
  inspectorId: String
  disposition: QualityDisposition!
  sampleSize: Int
  defectsFound: Int
  inspectionResults: [InspectionResult!]!
  nonConformances: [NonConformance!]!
  notes: String
}

type InspectionResult {
  id: UUID!
  qualityResultId: UUID!
  specificationId: UUID!
  specification: ProductSpecification
  measuredValue: Float
  pass: Boolean!
  notes: String
}

type NonConformance {
  id: UUID!
  qualityResultId: UUID!
  defectCode: String!
  defectDescription: String!
  severity: String
  quantity: Float
  dispositionAction: String
  rootCause: String
  correctiveAction: String
}

type SPC {
  id: UUID!
  productId: UUID!
  specificationId: UUID!
  controlChartType: String!
  centerLine: Float!
  upperControlLimit: Float!
  lowerControlLimit: Float!
  dataPoints: [SPCDataPoint!]!
  cpk: Float
  cp: Float
}

type SPCDataPoint {
  timestamp: DateTime!
  value: Float!
  subgroupId: String
  isOutOfControl: Boolean!
}

# ─────────────────────────────────────────────
# OEE Analytics
# ─────────────────────────────────────────────

type OEEMetrics {
  assetId: UUID
  lineId: UUID
  periodStart: DateTime!
  periodEnd: DateTime!
  availability: Float!
  performance: Float!
  quality: Float!
  oee: Float!
  plannedProductionTime: Float!
  actualProductionTime: Float!
  downtime: Float!
  totalPartsProduced: Float!
  goodPartsProduced: Float!
  scrapParts: Float!
