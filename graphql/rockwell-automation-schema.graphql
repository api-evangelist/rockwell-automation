  createdAt: DateTime!
  updatedAt: DateTime!
}

type Recipe {
  id: UUID!
  productId: UUID!
  name: String!
  version: String!
  effectiveDate: DateTime!
  phases: [RecipePhase!]!
  parameters: [RecipeParameter!]!
}

type RecipePhase {
  id: UUID!
  recipeId: UUID!
  phaseNumber: Int!
  name: String!
  description: String
  steps: [RecipeStep!]!
}

type RecipeStep {
  id: UUID!
  phaseId: UUID!
  stepNumber: Int!
  description: String!
