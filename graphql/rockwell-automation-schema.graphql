"""
Rockwell Automation FactoryTalk GraphQL Schema
Covers PLC data, production metrics, quality management, OEE analytics,
asset management, batch records, and MES integration for discrete and
process manufacturing via the Plex ERP and FactoryTalk platform APIs.
"""

# ─────────────────────────────────────────────
# Scalars
# ─────────────────────────────────────────────

scalar DateTime
scalar JSON
scalar UUID

# ─────────────────────────────────────────────
# Enums
# ─────────────────────────────────────────────

enum AssetStatus {
  ACTIVE
  INACTIVE
  UNDER_MAINTENANCE
  DECOMMISSIONED
  PENDING_INSTALLATION
}

enum AlarmSeverity {
  CRITICAL
  HIGH
  MEDIUM
  LOW
  INFORMATIONAL
}

enum AlarmState {
  ACTIVE
  ACKNOWLEDGED
  CLEARED
  SUPPRESSED
}

enum BatchStatus {
  PLANNED
  IN_PROGRESS
  PAUSED
  COMPLETED
  ABORTED
  ON_HOLD
}

enum OrderStatus {
  DRAFT
  RELEASED
  IN_PROGRESS
  COMPLETED
  CANCELLED
  ON_HOLD
}

enum QualityDisposition {
  ACCEPT
  REJECT
  CONDITIONAL_ACCEPT
  PENDING_REVIEW
  SCRAPPED
  REWORKED
}

enum WorkOrderStatus {
  OPEN
  RELEASED
  IN_PROGRESS
  COMPLETED
  CLOSED
  CANCELLED
}

enum MaintenanceType {
  PREVENTIVE
  CORRECTIVE
  PREDICTIVE
  CONDITION_BASED
  EMERGENCY
}

enum MaintenanceStatus {
  SCHEDULED
  IN_PROGRESS
  COMPLETED
  DEFERRED
  CANCELLED
}

enum PLCConnectionState {
  CONNECTED
  DISCONNECTED
  FAULTED
  UNKNOWN
}

enum TagDataType {
  BOOL
  INT
  DINT
  REAL
  STRING
  TIMER
  COUNTER
  DWORD
}

enum ShiftType {
  DAY
  EVENING
  NIGHT
  WEEKEND
}

enum DowntimeCategory {
  PLANNED
  UNPLANNED
  MAINTENANCE
  QUALITY
  CHANGEOVER
  MATERIAL
  LABOR
  EQUIPMENT
}

enum ProductionMetricType {
  THROUGHPUT
  YIELD
  CYCLE_TIME
  TAKT_TIME
  SCRAP_RATE
  FIRST_PASS_YIELD
}

# ─────────────────────────────────────────────
# Core Domain Types
# ─────────────────────────────────────────────

type Site {
  id: UUID!
  name: String!
  code: String!
  description: String
  address: Address
  timezone: String!
  plants: [Plant!]!
  assets: [Asset!]!
  createdAt: DateTime!
  updatedAt: DateTime!
}

type Plant {
  id: UUID!
  siteId: UUID!
  site: Site!
  name: String!
  code: String!
  description: String
  productionLines: [ProductionLine!]!
  workCenters: [WorkCenter!]!
  createdAt: DateTime!
  updatedAt: DateTime!
}

type Address {
  street1: String
  street2: String
  city: String
  state: String
  postalCode: String
  country: String!
}

type ProductionLine {
  id: UUID!
  plantId: UUID!
  plant: Plant!
  name: String!
  code: String!
  description: String
  workCenters: [WorkCenter!]!
  assets: [Asset!]!
  currentOEE: OEEMetrics
  activeWorkOrders: [WorkOrder!]!
}

type WorkCenter {
  id: UUID!
  plantId: UUID!
  lineId: UUID
  name: String!
  code: String!
  description: String
  assets: [Asset!]!
  plcControllers: [PLCController!]!
  activeAlarms: [Alarm!]!
  currentShift: Shift
}

# ─────────────────────────────────────────────
# Asset Management
# ─────────────────────────────────────────────

type Asset {
  id: UUID!
  siteId: UUID!
  plantId: UUID
  lineId: UUID
  workCenterId: UUID
  name: String!
  assetTag: String!
  serialNumber: String
  description: String
  manufacturer: String
  model: String
  installDate: DateTime
  status: AssetStatus!
  category: AssetCategory
  location: String
  plcControllers: [PLCController!]!
  maintenanceRecords: [MaintenanceRecord!]!
  alarms: [Alarm!]!
  sensorReadings: [SensorReading!]!
  createdAt: DateTime!
  updatedAt: DateTime!
}

type AssetCategory {
  id: UUID!
  name: String!
  code: String!
  description: String
  parentCategory: AssetCategory
  childCategories: [AssetCategory!]!
}

type MaintenanceRecord {
  id: UUID!
  assetId: UUID!
  asset: Asset!
  maintenanceType: MaintenanceType!
  status: MaintenanceStatus!
  scheduledDate: DateTime
  startDate: DateTime
  completionDate: DateTime
  technicianId: String
  description: String!
  findings: String
  partsUsed: [MaintenancePart!]!
  laborHours: Float
  cost: Float
  workOrderId: UUID
  createdAt: DateTime!
  updatedAt: DateTime!
}

type MaintenancePart {
  partNumber: String!
  description: String!
  quantity: Float!
  unitCost: Float
}

# ─────────────────────────────────────────────
# PLC / Controller Data
# ─────────────────────────────────────────────

type PLCController {
  id: UUID!
  assetId: UUID
  workCenterId: UUID
  name: String!
  ipAddress: String
  slotNumber: Int
  firmware: String
  model: String
  connectionState: PLCConnectionState!
  tags: [PLCTag!]!
  lastCommunication: DateTime
  createdAt: DateTime!
  updatedAt: DateTime!
}

type PLCTag {
  id: UUID!
  controllerId: UUID!
  controller: PLCController!
  name: String!
  address: String!
  dataType: TagDataType!
  description: String
  unit: String
  currentValue: TagValue
  historicalValues(
    startTime: DateTime!
    endTime: DateTime!
    limit: Int
  ): [TagValue!]!
}

type TagValue {
  tagId: UUID!
  value: String!
  quality: TagQuality!
  timestamp: DateTime!
}

type TagQuality {
  code: Int!
  description: String!
  isGood: Boolean!
}

# ─────────────────────────────────────────────
# Alarms & Events
# ─────────────────────────────────────────────

type Alarm {
  id: UUID!
  assetId: UUID
  asset: Asset
  workCenterId: UUID
  name: String!
  description: String!
  severity: AlarmSeverity!
  state: AlarmState!
  triggeredAt: DateTime!
  acknowledgedAt: DateTime
  clearedAt: DateTime
  acknowledgedBy: String
  tagName: String
  triggerValue: String
  setpointValue: String
  priority: Int
}

type AlarmSummary {
  totalActive: Int!
  bySeverity: [AlarmCountBySeverity!]!
  recentAlarms: [Alarm!]!
}

type AlarmCountBySeverity {
  severity: AlarmSeverity!
  count: Int!
}

# ─────────────────────────────────────────────
# Production & Scheduling
# ─────────────────────────────────────────────

type WorkOrder {
  id: UUID!
  workOrderNumber: String!
  plantId: UUID!
  lineId: UUID
  workCenterId: UUID
  productId: UUID!
  product: Product!
  status: WorkOrderStatus!
  scheduledStartDate: DateTime
  scheduledEndDate: DateTime
  actualStartDate: DateTime
  actualEndDate: DateTime
  plannedQuantity: Float!
  completedQuantity: Float
  scrapQuantity: Float
  unit: String!
