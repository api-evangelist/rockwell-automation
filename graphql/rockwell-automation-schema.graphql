}

# ─────────────────────────────────────────────
# Pagination & Filter Types
# ─────────────────────────────────────────────

type PageInfo {
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
  startCursor: String
  endCursor: String
  totalCount: Int!
}

type AssetConnection {
  nodes: [Asset!]!
  pageInfo: PageInfo!
}

type WorkOrderConnection {
  nodes: [WorkOrder!]!
  pageInfo: PageInfo!
}

type AlarmConnection {
  nodes: [Alarm!]!
  pageInfo: PageInfo!
}

# ─────────────────────────────────────────────
# Input Types
# ─────────────────────────────────────────────

input DateRangeInput {
  startTime: DateTime!
  endTime: DateTime!
}

input AssetFilterInput {
  siteId: UUID
  plantId: UUID
  lineId: UUID
  status: AssetStatus
  category: String
  searchTerm: String
}

input WorkOrderFilterInput {
  plantId: UUID
  lineId: UUID
  productId: UUID
  status: WorkOrderStatus
  scheduledStartAfter: DateTime
  scheduledStartBefore: DateTime
}

input AlarmFilterInput {
  assetId: UUID
  workCenterId: UUID
  severity: AlarmSeverity
  state: AlarmState
  triggeredAfter: DateTime
}

input OEEQueryInput {
  assetId: UUID
  lineId: UUID
  period: DateRangeInput!
  groupBy: String
}

input CreateWorkOrderInput {
  plantId: UUID!
  lineId: UUID
  workCenterId: UUID
  productId: UUID!
  plannedQuantity: Float!
  unit: String!
  scheduledStartDate: DateTime
  scheduledEndDate: DateTime
  routingId: UUID
}

input UpdateWorkOrderStatusInput {
  workOrderId: UUID!
  status: WorkOrderStatus!
  notes: String
}

input AcknowledgeAlarmInput {
  alarmId: UUID!
  acknowledgedBy: String!
  notes: String
}

input CreateMaintenanceRecordInput {
  assetId: UUID!
  maintenanceType: MaintenanceType!
  scheduledDate: DateTime
  description: String!
  technicianId: String
}

input LogProductionInput {
  workOrderId: UUID!
  workCenterId: UUID
  quantity: Float!
  scrapQuantity: Float
  unit: String!
  operatorId: String
  timestamp: DateTime
  notes: String
}

input RecordQualityResultInput {
  workOrderId: UUID
  batchId: UUID
  productId: UUID!
  disposition: QualityDisposition!
  sampleSize: Int
  defectsFound: Int
  inspectorId: String
  inspectionResults: [InspectionResultInput!]
  notes: String
}

input InspectionResultInput {
  specificationId: UUID!
  measuredValue: Float!
  notes: String
}

# ─────────────────────────────────────────────
# Query Root
# ─────────────────────────────────────────────

type Query {
  # Sites & Plants
  sites: [Site!]!
  site(id: UUID!): Site
  plant(id: UUID!): Plant
  plants(siteId: UUID!): [Plant!]!
  productionLines(plantId: UUID!): [ProductionLine!]!
  workCenters(plantId: UUID, lineId: UUID): [WorkCenter!]!

  # Assets
  asset(id: UUID!): Asset
  assets(filter: AssetFilterInput, limit: Int, offset: Int): AssetConnection!
  assetsByWorkCenter(workCenterId: UUID!): [Asset!]!

  # PLC & Tag Data
  plcController(id: UUID!): PLCController
  plcControllers(assetId: UUID, workCenterId: UUID): [PLCController!]!
  plcTag(id: UUID!): PLCTag
  tagCurrentValue(tagId: UUID!): TagValue
  tagHistoricalValues(tagId: UUID!, period: DateRangeInput!, limit: Int): [TagValue!]!

  # Alarms
  alarm(id: UUID!): Alarm
  alarms(filter: AlarmFilterInput, limit: Int, offset: Int): AlarmConnection!
  activeAlarms(siteId: UUID, plantId: UUID, severity: AlarmSeverity): [Alarm!]!
  alarmSummary(siteId: UUID, plantId: UUID): AlarmSummary!

  # Work Orders & Production
  workOrder(id: UUID!): WorkOrder
  workOrders(filter: WorkOrderFilterInput, limit: Int, offset: Int): WorkOrderConnection!
  productionRecords(workOrderId: UUID!, period: DateRangeInput): [ProductionRecord!]!
  currentShift(plantId: UUID!): Shift

  # OEE & Analytics
  oeeMetrics(input: OEEQueryInput!): OEEMetrics!
  downtimeEvents(assetId: UUID, lineId: UUID, period: DateRangeInput!, category: DowntimeCategory): [DowntimeEvent!]!
  productionMetrics(workCenterId: UUID, lineId: UUID, metricType: ProductionMetricType, period: DateRangeInput!): [ProductionMetric!]!
  productionReport(lineId: UUID, workCenterId: UUID, period: DateRangeInput!, shiftId: UUID): ProductionReport!

  # Quality
  qualityResult(id: UUID!): QualityResult
  qualityResults(workOrderId: UUID, productId: UUID, disposition: QualityDisposition, period: DateRangeInput): [QualityResult!]!
  spc(productId: UUID!, specificationId: UUID!): SPC

  # Batch Records
  batchRecord(id: UUID!): BatchRecord
  batchRecords(productId: UUID, status: BatchStatus, period: DateRangeInput): [BatchRecord!]!
  recipe(id: UUID!): Recipe
  recipes(productId: UUID!): [Recipe!]!

  # Products & BOM
  product(id: UUID!): Product
  products(category: String, searchTerm: String, limit: Int, offset: Int): [Product!]!
  billOfMaterials(productId: UUID!, revision: String): BillOfMaterials

  # Inventory
  material(id: UUID!): Material
  materials(searchTerm: String, lotTracked: Boolean): [Material!]!
  materialLot(id: UUID!): MaterialLot
  materialLots(materialId: UUID!, status: String): [MaterialLot!]!

  # Customers & Orders
  customer(id: UUID!): Customer
  customers(searchTerm: String, limit: Int, offset: Int): [Customer!]!
  customerOrder(id: UUID!): CustomerOrder
  customerOrders(customerId: UUID, status: OrderStatus, period: DateRangeInput): [CustomerOrder!]!

  # Shipping
  shipment(id: UUID!): Shipment
  shipments(orderId: UUID, status: String, period: DateRangeInput): [Shipment!]!

  # Personnel
  operator(id: UUID!): Operator
  operators(departmentId: String, workCenterCode: String): [Operator!]!

  # Sensors
  sensorReadings(assetId: UUID!, sensorId: String, period: DateRangeInput!, limit: Int): [SensorReading!]!
  sensorConfigs(assetId: UUID!): [SensorConfig!]!

  # Energy
  energyConsumption(assetId: UUID!, period: DateRangeInput!): EnergyConsumption!
}

# ─────────────────────────────────────────────
# Mutation Root
# ─────────────────────────────────────────────

type Mutation {
  # Work Orders
  createWorkOrder(input: CreateWorkOrderInput!): WorkOrder!
  updateWorkOrderStatus(input: UpdateWorkOrderStatusInput!): WorkOrder!
  logProduction(input: LogProductionInput!): ProductionRecord!

  # Quality
  recordQualityResult(input: RecordQualityResultInput!): QualityResult!

  # Alarms
  acknowledgeAlarm(input: AcknowledgeAlarmInput!): Alarm!
  clearAlarm(alarmId: UUID!, clearedBy: String!): Alarm!

  # Maintenance
  createMaintenanceRecord(input: CreateMaintenanceRecordInput!): MaintenanceRecord!
  completeMaintenanceRecord(id: UUID!, findings: String, laborHours: Float, cost: Float): MaintenanceRecord!

  # Downtime
  logDowntimeEvent(assetId: UUID, lineId: UUID, startTime: DateTime!, category: DowntimeCategory!, reason: String, description: String, isPlanned: Boolean!): DowntimeEvent!
  closeDowntimeEvent(id: UUID!, endTime: DateTime!): DowntimeEvent!
}

# ─────────────────────────────────────────────
# Subscription Root
# ─────────────────────────────────────────────

type Subscription {
  alarmTriggered(siteId: UUID, plantId: UUID, severity: AlarmSeverity): Alarm!
  tagValueChanged(tagId: UUID!): TagValue!
  workOrderStatusChanged(plantId: UUID): WorkOrder!
  productionCountUpdated(lineId: UUID!): ProductionRecord!
  oeeUpdated(lineId: UUID!): OEEMetrics!
}
