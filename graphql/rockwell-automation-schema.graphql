}

type DowntimeEvent {
  id: UUID!
  assetId: UUID
  lineId: UUID
  startTime: DateTime!
  endTime: DateTime
  duration: Float
  category: DowntimeCategory!
  reason: String
  description: String
  reportedBy: String
