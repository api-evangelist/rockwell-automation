- aid: rockwell-automation:factorytalk-datamosaix-api
  name: Rockwell Automation FactoryTalk DataMosaix API
  description: FactoryTalk DataMosaix is an Industrial DataOps solution that provides
    REST API access for industrial data management, contextualization, and analytics.
    Supports machine-to-machine (M2M) communication, data ingestion, visualization,
    and integration with enterprise analytics tools via OpenAPI-specified endpoints
    accessible through Swagger UI.
  tags:
  - Industrial Data
  - DataOps
  - Manufacturing
  - REST
  - Industrial Automation
  humanURL: https://www.rockwellautomation.com/en-us/products/software/factorytalk/datamosaix.html
