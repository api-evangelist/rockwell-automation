- aid: rockwell-automation:emulate3d-api
  name: Rockwell Automation Emulate3D API
  description: Emulate3D Core API provides programmatic access to 3D simulation and
    digital twin capabilities for factory automation. Enables integration with Nvidia
    Omniverse and custom automation workflows via scripting interfaces.
