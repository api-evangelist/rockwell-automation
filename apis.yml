- aid: rockwell-automation:plex-erp-api
  name: Rockwell Automation Plex ERP API
  description: Plex by Rockwell Automation provides a Smart Manufacturing Platform
    ERP API with REST/JSON endpoints for customer orders, shipping, production, quality,
    and just-in-sequence parts delivery. Enables integration with third-party systems
    and cloud services through role-based security.
  tags:
  - ERP
  - Manufacturing
  - Smart Manufacturing
