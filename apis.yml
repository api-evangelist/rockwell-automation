aid: rockwell-automation
name: Rockwell Automation
description: Rockwell Automation is a global provider of industrial automation and
  digital transformation solutions, helping manufacturers boost productivity, sustainability,
  and agility. The company offers a portfolio of hardware, software, and services
  including programmable logic controllers (PLCs), industrial networking, motor control,
  safety systems, and the FactoryTalk software suite for MES, SCADA, historian, remote
  access, and industrial data management.
