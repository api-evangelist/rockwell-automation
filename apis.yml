    type: Documentation
- aid: rockwell-automation:logix-designer-api
  name: Rockwell Automation Logix Designer SDK
  description: The Studio 5000 Logix Designer Software Development Kit (LDSDK) provides
    programmatic access to Logix controller programming for CI/CD pipeline automation,
    version control integration, and export of L5X controller files for PLC program
    management.
  tags:
  - PLC
  - Programming
  - SDK
