    type: Documentation
  - url: https://www.rockwellautomation.com/en-us/products/software/factorytalk/datamosaix.html
    type: Website
- aid: rockwell-automation:factorytalk-remote-access-api
  name: Rockwell Automation FactoryTalk Remote Access Web API
  description: FactoryTalk Remote Access (FTRA) Web API provides RESTful HTTP interface
    for remote access management, enabling developers to integrate industrial device
    remote access capabilities into third-party applications and proprietary systems.
    Supports GET, POST, PUT, PATCH, and DELETE operations for device and session management.
  tags:
  - Remote Access
  - Industrial Automation
  - REST
  - Manufacturing
  humanURL: https://www.rockwellautomation.com/en-us/products/software/factorytalk/remote-access.html
  baseURL: https://api.rockwellautomation.com
  properties:
